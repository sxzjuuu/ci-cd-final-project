name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: pip install flake8 nose

    - name: Lint with flake8
      run: flake8 .

    - name: Run unit tests with nose
      run: nosetests
